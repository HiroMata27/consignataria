<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Vehículos</title>
</head>
<body>
<h1>Vehículos</h1>
<a href="/vehiculos/nuevo">+ Nuevo Vehículo</a>
<br><br>
<table border="1">
  <thead>
  <tr>
    <th>Placa</th>
    <th>Modelo</th>
    <th>Color</th>
    <th>Valor Compra</th>
    <th>Valor Venta</th>
    <th>Estado</th>
    <th>Dueño</th>
    <th>Acciones</th>
  </tr>
  </thead>
  <tbody>
  <tr th:each="vehiculo : ${vehiculos}">
    <td th:text="${vehiculo.placa}"></td>
    <td th:text="${vehiculo.modelo}"></td>
    <td th:text="${vehiculo.color}"></td>
    <td th:text="${#numbers.formatDecimal(vehiculo.valorCompra, 1, 'POINT', 0, 'COMMA')}"></td>
    <td th:text="${#numbers.formatDecimal(vehiculo.valorVenta, 1, 'POINT', 0, 'COMMA')}"></td>
    <td th:text="${vehiculo.estado}"></td>
    <td th:text="${vehiculo.dueno.nombres + ' ' + vehiculo.dueno.apellidos}"></td>
    <td>
      <a th:if="${vehiculo.estado.name() == 'DISPONIBLE'}"
         th:href="@{/vehiculos/vender/{placa}(placa=${vehiculo.placa})}">Vender</a>
      <span th:if="${vehiculo.estado.name() == 'VENDIDO'}">Vendido</span>
      &nbsp;
      <a th:href="@{/vehiculos/eliminar/{placa}(placa=${vehiculo.placa})}">Eliminar</a>
    </td>
  </tr>
  </tbody>
</table>
<br>
<a href="/duenos">Ver Dueños</a>
</body>
</html>

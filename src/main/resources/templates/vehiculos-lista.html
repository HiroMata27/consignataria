<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Nuevo Dueño</title>
</head>
<body>
<h1>Registrar Dueño</h1>
<form action="/duenos/guardar" method="post" th:object="${dueno}">
  <label>Cédula:</label>
  <input type="text" th:field="*{cedula}" required/><br><br>

  <label>Nombres:</label>
  <input type="text" th:field="*{nombres}" required/><br><br>

  <label>Apellidos:</label>
  <input type="text" th:field="*{apellidos}" required/><br><br>

  <button type="submit">Guardar</button>
</form>
<br>
<a href="/duenos">Volver</a>
</body>
</html>
